[workspace]
resolver = "2"
members = [
    "crates/qf-core",
    "crates/qf-engine",
    "crates/qf-scheduler",
    "crates/qf-io",
    "crates/qf-protocol",
    "crates/qf-sniffer",
    "crates/qf-crypto",
    "crates/qf-p2sp",
    "crates/qf-app",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"

[workspace.dependencies]
# 序列化
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# 错误处理
thiserror = "2"
anyhow = "1"

# 异步运行时
tokio = { version = "1", features = ["full"] }

# 日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# HTTP
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream", "json"] }
hyper = { version = "1", features = ["server", "http1", "http2"] }
hyper-util = "0.1"
http-body-util = "0.1"

# QUIC
quinn = "0.11"
rustls = "0.23"
rcgen = "0.13"

# 哈希
blake3 = "1"
sha2 = "0.10"

# Tauri
tauri = { version = "2", features = ["tray-icon"] }
tauri-build = "2"

# GPU
wgpu = "24"

# 时间与异步
futures = "0.3"
bytes = "1"

# 配置
toml = "0.8"

# UUID 与时间
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# 网络
url = "2"

# 开发依赖
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }
mockall = "0.13"
rstest = "0.22"
tempfile = "3"
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.bench]
inherits = "release"
debug = true
