<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumFetch</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
  <style>
    /* ===== 设计令牌 ===== */
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1a1a24;
      --text: #d8d8e0;
      --text-2: #6a6a78;
      --text-3: #3a3a48;
      --accent: #10b981;
      --ok: #22c55e;
      --warn: #eab308;
      --err: #ef4444;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    /* ===== 基础重置 ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* 等宽数字 */
    .mono { font-family: var(--font-mono); }

    /* ===== 全局网格布局 ===== */
    .app {
      display: grid;
      grid-template-columns: 200px 1fr auto;
      height: 100vh;
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-logo {
      padding: 20px 16px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
    }
    .sidebar-nav {
      padding: 8px;
      flex: 1;
    }
    .nav-item {
      padding: 8px 12px;
      color: var(--text-2);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.15s, background 0.15s;
      user-select: none;
      border-radius: 4px;
    }
    .nav-item:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }
    .nav-item.active {
      color: var(--accent);
    }
    .nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nav-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .sidebar-stats {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-3);
      line-height: 2;
    }
    .sidebar-stats .mono {
      color: var(--text-2);
    }

    /* ===== 主区域 ===== */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== 顶部栏 ===== */
    .topbar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .url-bar {
      flex: 1;
      display: flex;
      gap: 8px;
    }
    .url-bar input {
      flex: 1;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-mono);
      outline: none;
      transition: border-color 0.15s;
    }
    .url-bar input:focus {
      border-color: var(--accent);
    }
    .url-bar input::placeholder {
      color: var(--text-3);
      font-family: var(--font-sans);
    }

    /* ===== 按钮 ===== */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active {
      transform: translateY(1px);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      opacity: 0.85;
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-3);
    }

    /* ===== 内容区 ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    /* 滚动条 */
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    /* ===== 视图切换 ===== */
    .settings-view,
    .sniffer-view {
      display: none;
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }
    .settings-view.active,
    .sniffer-view.active {
      display: block;
    }
    .downloads-view {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    .downloads-view.active {
      display: flex;
    }

    /* ===== 下载条目 ===== */
    .download-card {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .download-card:hover {
      border-color: var(--text-3);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .card-name .ext {
      font-size: 10px;
      font-family: var(--font-mono);
      font-weight: 600;
      padding: 1px 5px;
      background: rgba(16,185,129,0.1);
      color: var(--accent);
      border-radius: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .card-status {
      font-size: 11px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .card-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* 状态圆点 + 颜色 */
    .status-downloading { color: var(--accent); }
    .status-downloading::before { background: var(--accent); animation: breathe 2s ease-in-out infinite; }
    .status-completed { color: var(--ok); }
    .status-completed::before { background: var(--ok); }
    .status-paused { color: var(--warn); }
    .status-paused::before { background: var(--warn); }
    .status-failed { color: var(--err); }
    .status-failed::before { background: var(--err); }
    .status-pending { color: var(--text-2); }
    .status-pending::before { background: var(--text-3); animation: breathe 3s ease-in-out infinite; }
    .status-cancelled { color: var(--text-3); text-decoration: line-through; }
    .status-cancelled::before { background: var(--text-3); }

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== 进度条 ===== */
    .progress-bar {
      height: 3px;
      background: var(--border);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%;
      transition: width 0.3s linear;
    }
    .progress-fill.downloading { background: var(--accent); }
    .progress-fill.completed { background: var(--ok); }
    .progress-fill.paused { background: var(--warn); }
    .progress-fill.failed { background: var(--err); }
    .progress-fill.pending { background: var(--text-3); }
    .progress-fill.cancelled { background: var(--text-3); }

    /* ===== 卡片详情行 ===== */
    .card-details {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 11px;
      color: var(--text-2);
    }
    .detail-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .detail-label {
      color: var(--text-3);
    }
    .detail-item .mono {
      color: var(--text-2);
    }
    .speed-value {
      color: var(--accent);
      font-weight: 600;
      font-family: var(--font-mono);
    }

    /* ===== 操作按钮 ===== */
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .btn-card-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-weight: 500;
      font-family: var(--font-sans);
      transition: color 0.15s, border-color 0.15s, transform 0.1s;
    }
    .btn-card-action:active {
      transform: translateY(1px);
    }
    .btn-card-action:hover {
      color: var(--text);
      border-color: var(--text-3);
    }
    .btn-card-action svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .btn-card-action.action-danger:hover {
      color: var(--err);
      border-color: rgba(239,68,68,0.3);
    }

    /* ===== 空状态 ===== */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      gap: 12px;
      padding: 40px 0;
    }
    .empty-icon {
      width: 40px;
      height: 40px;
      stroke: var(--text-3);
      fill: none;
      stroke-width: 1;
      opacity: 0.4;
    }
    .empty-text {
      font-size: 13px;
      color: var(--text-2);
    }
    .empty-hint {
      font-size: 11px;
      color: var(--text-3);
    }

    /* ===== 右侧详情面板 ===== */
    .detail-panel {
      width: 260px;
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      flex-shrink: 0;
      overflow-y: auto;
      display: none;
    }
    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
    }
    .panel-label {
      color: var(--text-3);
    }
    .panel-value {
      color: var(--text);
      font-weight: 500;
    }
    .panel-value.mono {
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .speed-value {
      color: var(--accent);
    }

    /* ===== 分片可视化 ===== */
    .fragment-grid {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .fragment-block {
      width: 100%;
      height: 2px;
      background: var(--border);
      transition: background 0.3s;
    }
    .fragment-block.done { background: var(--accent); }
    .fragment-block.active { background: var(--accent); animation: breathe 1.5s ease-in-out infinite; }
    .fragment-block.pending { background: var(--border); }

    /* ===== 设置面板 ===== */
    .setting-group {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .setting-group-title {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label {
      font-size: 13px;
      color: var(--text-2);
    }
    .setting-value {
      font-size: 13px;
    }
    .setting-input {
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      font-family: var(--font-mono);
      outline: none;
      width: 200px;
      transition: border-color 0.15s;
    }
    .setting-input:focus {
      border-color: var(--accent);
    }
    select.setting-input {
      cursor: pointer;
      font-family: var(--font-sans);
    }

    /* ===== Toggle 开关 ===== */
    .toggle {
      width: 40px;
      height: 22px;
      background: var(--border);
      border: 1px solid var(--text-3);
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }
    .toggle.on {
      background: var(--accent);
      border-color: var(--accent);
    }
    .toggle::after {
      content: '';
      width: 16px;
      height: 16px;
      background: var(--text);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle.on::after {
      transform: translateX(18px);
    }

    /* ===== 嗅探面板 ===== */
    .sniffer-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .sniffer-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .sniffer-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
    }
    .sniffer-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sniffer-status.active { color: var(--ok); }
    .sniffer-status.active::before { background: var(--ok); animation: breathe 2s ease-in-out infinite; }
    .sniffer-status.inactive { color: var(--text-3); }
    .sniffer-status.inactive::before { background: var(--text-3); }
    .sniffer-list {
      display: flex;
      flex-direction: column;
    }
    .sniffer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.15s;
    }
    .sniffer-item:hover {
      border-color: var(--text-3);
    }
    .sniffer-type {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 2px;
      font-family: var(--font-mono);
      font-weight: 600;
      text-transform: uppercase;
      min-width: 48px;
      text-align: center;
      flex-shrink: 0;
    }
    .type-video { background: rgba(239,68,68,0.1); color: var(--err); }
    .type-audio { background: rgba(34,197,94,0.1); color: var(--ok); }
    .type-document { background: rgba(14,165,233,0.1); color: #0ea5e9; }
    .type-archive { background: rgba(234,179,8,0.1); color: var(--warn); }
    .type-executable { background: rgba(168,85,247,0.1); color: #a855f7; }
    .sniffer-info {
      flex: 1;
      min-width: 0;
    }
    .sniffer-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sniffer-url {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--font-mono);
    }
    .sniffer-size {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-2);
      min-width: 64px;
      text-align: right;
      flex-shrink: 0;
    }
    .sniffer-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-sm {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-family: var(--font-sans);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-sm:active { transform: translateY(1px); }
    .btn-download-sm {
      background: var(--accent);
      color: #fff;
    }
    .btn-download-sm:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar">
      <div class="sidebar-logo">QuantumFetch</div>
      <div class="sidebar-nav">
        <div class="nav-item active" data-view="downloads">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20"><path d="M10 3v10m0 0l-3.5-3.5M10 13l3.5-3.5M4 17h12"/></svg>
          </span>
          <span>下载列表</span>
        </div>
        <div class="nav-item" data-view="sniffer">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20"><path d="M10 4C6 4 3 7.5 3 10.5S6 17 10 17s7-3.5 7-6.5S14 4 10 4z"/><circle cx="10" cy="10.5" r="2.5"/></svg>
          </span>
          <span>资源嗅探</span>
        </div>
        <div class="nav-item" data-view="settings">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="3"/><path d="M10 1.5v2m0 13v2M18.5 10h-2m-13 0h-2M15.66 4.34l-1.42 1.42M5.76 14.24l-1.42 1.42m11.32 0l-1.42-1.42M5.76 5.76L4.34 4.34"/></svg>
          </span>
          <span>设置</span>
        </div>
      </div>
      <div class="sidebar-stats">
        <div>活跃连接 <span class="mono" id="stat-connections">0</span></div>
        <div>总速度 <span class="mono" id="stat-speed">0 B/s</span></div>
        <div>队列任务 <span class="mono" id="stat-queue">0</span></div>
      </div>
    </div>

    <!-- 主区域 -->
    <div class="main">
      <!-- 顶部栏 -->
      <div class="topbar">
        <div class="url-bar">
          <input type="text" id="url-input" placeholder="粘贴下载链接,支持 HTTP/HTTPS/FTP/QUIC..." />
          <button class="btn btn-primary" id="btn-download">开始下载</button>
        </div>
        <button class="btn btn-ghost" id="btn-pause-all">全部暂停</button>
      </div>

      <!-- 内容区 -->
      <div class="content" id="content">
        <!-- 下载列表视图 -->
        <div class="downloads-view active" id="view-downloads">
          <div class="section-title">下载中</div>
          <div id="active-downloads"></div>
          <div class="section-title" style="margin-top: 20px;">已完成</div>
          <div id="completed-downloads"></div>
          <div class="empty-state" id="empty-state">
            <svg class="empty-icon" viewBox="0 0 20 20"><path d="M10 3v10m0 0l-3.5-3.5M10 13l3.5-3.5M4 17h12"/></svg>
            <div class="empty-text">暂无下载任务</div>
            <div class="empty-hint">在上方输入链接开始下载</div>
          </div>
        </div>

        <!-- 嗅探视图 -->
        <div class="sniffer-view" id="view-sniffer">
          <div class="sniffer-header">
            <h2>资源嗅探</h2>
            <span class="sniffer-status active" id="sniffer-status">监听中</span>
            <button class="btn btn-ghost" onclick="toggleSniffer()" style="margin-left: auto;">暂停监听</button>
          </div>
          <div class="section-title">检测到的资源</div>
          <div class="sniffer-list" id="sniffer-list"></div>
          <div class="empty-state" id="sniffer-empty" style="min-height: 300px;">
            <svg class="empty-icon" viewBox="0 0 20 20"><path d="M10 4C6 4 3 7.5 3 10.5S6 17 10 17s7-3.5 7-6.5S14 4 10 4z"/><circle cx="10" cy="10.5" r="2.5"/></svg>
            <div class="empty-text">正在监听浏览器流量...</div>
            <div class="empty-hint">浏览包含视频、音频或文档的网页时,资源将自动显示在这里</div>
          </div>
        </div>

        <!-- 设置视图 -->
        <div class="settings-view" id="view-settings">
          <h2 style="font-size: 15px; font-weight: 600; margin-bottom: 20px;">设置</h2>
          <div class="setting-group">
            <div class="setting-group-title">下载设置</div>
            <div class="setting-row">
              <span class="setting-label">下载目录</span>
              <input class="setting-input" id="cfg-download-dir" value="C:\Users\Downloads" />
            </div>
            <div class="setting-row">
              <span class="setting-label">最大并发任务数</span>
              <input class="setting-input" type="number" id="cfg-max-tasks" value="3" min="1" max="10" style="width: 80px;" />
            </div>
            <div class="setting-row">
              <span class="setting-label">每任务最大分片数</span>
              <input class="setting-input" type="number" id="cfg-max-fragments" value="16" min="1" max="64" style="width: 80px;" />
            </div>
            <div class="setting-row">
              <span class="setting-label">每主机最大连接数</span>
              <input class="setting-input" type="number" id="cfg-max-connections" value="16" min="1" max="32" style="width: 80px;" />
            </div>
          </div>
          <div class="setting-group">
            <div class="setting-group-title">协议设置</div>
            <div class="setting-row">
              <span class="setting-label">启用 QUIC 传输</span>
              <div class="toggle on" id="cfg-quic" onclick="this.classList.toggle('on')"></div>
            </div>
            <div class="setting-row">
              <span class="setting-label">启用 HTTP/2 多路复用</span>
              <div class="toggle on" id="cfg-http2" onclick="this.classList.toggle('on')"></div>
            </div>
          </div>
          <div class="setting-group">
            <div class="setting-group-title">安全设置</div>
            <div class="setting-row">
              <span class="setting-label">下载后校验完整性</span>
              <div class="toggle on" id="cfg-verify" onclick="this.classList.toggle('on')"></div>
            </div>
            <div class="setting-row">
              <span class="setting-label">校验算法</span>
              <select class="setting-input" id="cfg-hash" style="width: 120px;">
                <option value="blake3" selected>Blake3</option>
                <option value="sha256">SHA-256</option>
              </select>
            </div>
          </div>
          <div class="setting-group">
            <div class="setting-group-title">浏览器嗅探</div>
            <div class="setting-row">
              <span class="setting-label">启用资源嗅探</span>
              <div class="toggle on" id="cfg-sniffer" onclick="this.classList.toggle('on')"></div>
            </div>
            <div class="setting-row">
              <span class="setting-label">最小文件大小</span>
              <select class="setting-input" id="cfg-min-size" style="width: 120px;">
                <option value="0">不限制</option>
                <option value="1024" selected>1 KB</option>
                <option value="102400">100 KB</option>
                <option value="1048576">1 MB</option>
              </select>
            </div>
          </div>
          <div style="margin-top: 16px;">
            <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧详情面板 -->
    <div class="detail-panel" id="detail-panel">
      <div class="panel-title" id="panel-filename">--</div>
      <div class="panel-row">
        <span class="panel-label">文件大小</span>
        <span class="panel-value mono" id="panel-size">--</span>
      </div>
      <div class="panel-row">
        <span class="panel-label">已下载</span>
        <span class="panel-value mono" id="panel-downloaded">--</span>
      </div>
      <div class="panel-row">
        <span class="panel-label">速度</span>
        <span class="panel-value mono speed-value" id="panel-speed">--</span>
      </div>
      <div class="panel-row">
        <span class="panel-label">分片数</span>
        <span class="panel-value mono" id="panel-fragments">--</span>
      </div>
      <div class="panel-row">
        <span class="panel-label">协议</span>
        <span class="panel-value" id="panel-protocol">--</span>
      </div>
      <div class="panel-row">
        <span class="panel-label">状态</span>
        <span class="panel-value" id="panel-status">--</span>
      </div>
      <div style="margin-top: 16px;">
        <div class="section-title">分片进度</div>
        <div class="fragment-grid" id="fragment-grid"></div>
      </div>
    </div>
  </div>

  <script>
    // ======================================================================
    // 安全: HTML 转义函数 - 防止 XSS 注入
    // ======================================================================

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function escapeAttr(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ======================================================================
    // Tauri API 桥接层 - 自动检测环境
    // ======================================================================

    const isTauri = window.__TAURI__ !== undefined;

    /**
     * 调用 Tauri 后端命令。
     * Tauri 环境下调用真实命令,浏览器环境下返回模拟数据。
     */
    async function invoke(cmd, args = {}) {
      if (isTauri) {
        return await window.__TAURI__.core.invoke(cmd, args);
      }
      return mockInvoke(cmd, args);
    }

    // ======================================================================
    // 浏览器预览模拟层 (mockInvoke)
    // ======================================================================

    /** 模拟任务存储 */
    let mockTasks = [];
    /** 模拟 UUID 计数器 */
    let mockIdCounter = 1;

    /** 从 URL 提取文件名 */
    function extractFileName(url) {
      try {
        const u = new URL(url);
        const seg = u.pathname.split('/').pop();
        return seg || 'unknown';
      } catch {
        return 'unknown';
      }
    }

    /** 从文件名提取扩展名 */
    function guessExt(name) {
      const parts = name.split('.');
      return parts.length > 1 ? parts.pop().toUpperCase().slice(0, 4) : 'FILE';
    }

    /**
     * 模拟 Tauri 命令调用 - 仅在非 Tauri 浏览器环境下使用。
     * 复刻后端 commands.rs 的业务逻辑。
     */
    async function mockInvoke(cmd, args = {}) {
      switch (cmd) {
        case 'get_app_info':
          return { version: '0.1.0', name: 'QuantumFetch' };

        case 'supported_protocols':
          return ['HTTP', 'HTTPS', 'FTP', 'QUIC'];

        case 'create_task': {
          const id = 'mock-' + String(mockIdCounter++).padStart(4, '0');
          mockTasks.push({
            id,
            url: args.url,
            file_name: extractFileName(args.url),
            file_size: 0,
            downloaded: 0,
            speed: 0,
            status: 'pending',
            progress: 0.0,
            fragments_total: 0,
            fragments_done: 0,
            created_at: new Date().toISOString(),
          });
          return id;
        }

        case 'get_task_list':
          return [...mockTasks];

        case 'get_task_detail': {
          const t = mockTasks.find(t => t.id === args.taskId);
          if (!t) throw new Error('任务不存在: ' + args.taskId);
          return { ...t };
        }

        case 'pause_task': {
          const t = mockTasks.find(t => t.id === args.taskId);
          if (!t) throw new Error('任务不存在: ' + args.taskId);
          if (t.status === 'pending' || t.status === 'downloading') {
            t.status = 'paused';
            t.speed = 0;
          } else {
            throw new Error("当前状态 '" + t.status + "' 不允许暂停");
          }
          return null;
        }

        case 'resume_task': {
          const t = mockTasks.find(t => t.id === args.taskId);
          if (!t) throw new Error('任务不存在: ' + args.taskId);
          if (t.status === 'paused') {
            t.status = 'downloading';
          } else {
            throw new Error("仅暂停状态可恢复,当前状态: '" + t.status + "'");
          }
          return null;
        }

        case 'cancel_task': {
          const t = mockTasks.find(t => t.id === args.taskId);
          if (!t) throw new Error('任务不存在: ' + args.taskId);
          if (t.status === 'completed' || t.status === 'cancelled') {
            throw new Error('任务已' + t.status + ',无法取消');
          }
          t.status = 'cancelled';
          t.speed = 0;
          return null;
        }

        case 'delete_task': {
          const idx = mockTasks.findIndex(t => t.id === args.taskId);
          if (idx === -1) throw new Error('任务不存在: ' + args.taskId);
          const t = mockTasks[idx];
          if (t.status === 'completed' || t.status === 'cancelled' || t.status === 'failed') {
            mockTasks.splice(idx, 1);
          } else {
            throw new Error("当前状态 '" + t.status + "' 不允许删除,请先取消任务");
          }
          return null;
        }

        case 'get_config':
          return {
            download_dir: 'C:\\Users\\Downloads',
            max_concurrent_tasks: 5,
            max_concurrent_fragments: 16,
            max_connections_per_host: 16,
            enable_quic: false,
            verify_checksum: true,
          };

        case 'update_config':
          // 模拟保存成功
          return null;

        default:
          console.warn('未知命令:', cmd);
          return null;
      }
    }

    // ======================================================================
    // 下载数据与状态
    // ======================================================================

    const downloads = [];
    let selectedId = null;

    // ======================================================================
    // 格式化工具
    // ======================================================================

    function formatSize(bytes) {
      if (!bytes || bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return (bytes / Math.pow(k, i)).toFixed(i > 1 ? 1 : 0) + ' ' + sizes[i];
    }

    function formatSpeed(bytes) {
      return formatSize(bytes) + '/s';
    }

    function getProgress(dl) {
      return dl.size > 0 ? Math.round((dl.downloaded / dl.size) * 100) : 0;
    }

    /**
     * 从文件名推断扩展名标签
     */
    function guessExtFromName(name) {
      const parts = name.split('.');
      return parts.length > 1 ? parts.pop().toUpperCase().slice(0, 4) : 'FILE';
    }

    /**
     * 状态码映射为中文文本
     */
    function statusText(status) {
      return {
        downloading: '下载中',
        completed: '已完成',
        paused: '已暂停',
        failed: '失败',
        pending: '等待中',
        cancelled: '已取消',
      }[status] || status;
    }

    // ======================================================================
    // SVG 图标常量
    // ======================================================================

    const ICON_PAUSE = '<svg viewBox="0 0 12 12"><rect x="2" y="1" width="3" height="10" rx="0.5"/><rect x="7" y="1" width="3" height="10" rx="0.5"/></svg>';
    const ICON_RESUME = '<svg viewBox="0 0 12 12"><path d="M3 1v10l8-5z"/></svg>';
    const ICON_CANCEL = '<svg viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8"/></svg>';
    const ICON_DELETE = '<svg viewBox="0 0 12 12"><path d="M1.5 3h9M4.5 3V1.5h3V3M3 3v7.5h6V3"/><path d="M5 5.5v3M7 5.5v3"/></svg>';

    // ======================================================================
    // 渲染
    // ======================================================================

    function renderCard(dl) {
      const progress = getProgress(dl);

      const safeId = escapeAttr(dl.id);
      const safeName = escapeHtml(dl.name);
      const safeExt = escapeHtml(dl.ext);
      const safeStatusClass = 'status-' + escapeAttr(dl.status);
      const safeProgressClass = escapeAttr(dl.status);

      // 根据任务状态生成操作按钮
      let actionsHtml = '';
      if (dl.status === 'downloading' || dl.status === 'pending') {
        actionsHtml += '<button class="btn-card-action" onclick="event.stopPropagation(); taskPause(\'' + safeId + '\')">' + ICON_PAUSE + '暂停</button>';
      } else if (dl.status === 'paused') {
        actionsHtml += '<button class="btn-card-action" onclick="event.stopPropagation(); taskResume(\'' + safeId + '\')">' + ICON_RESUME + '恢复</button>';
      }
      // 活跃任务可取消
      if (dl.status !== 'completed' && dl.status !== 'cancelled') {
        actionsHtml += '<button class="btn-card-action action-danger" onclick="event.stopPropagation(); taskCancel(\'' + safeId + '\')">' + ICON_CANCEL + '取消</button>';
      }
      // 非活跃任务可删除
      if (dl.status === 'completed' || dl.status === 'cancelled' || dl.status === 'failed') {
        actionsHtml += '<button class="btn-card-action action-danger" onclick="event.stopPropagation(); taskDelete(\'' + safeId + '\')">' + ICON_DELETE + '删除</button>';
      }

      return `
        <div class="download-card" data-id="${safeId}" onclick="selectDownload('${safeId}')">
          <div class="card-header">
            <div class="card-name">
              ${safeName}
              <span class="ext">${safeExt}</span>
            </div>
            <span class="card-status ${safeStatusClass}">${escapeHtml(statusText(dl.status))}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${safeProgressClass}" style="width: ${progress}%"></div>
          </div>
          <div class="card-details">
            <div class="detail-item">
              <span class="detail-label">进度</span>
              <span class="mono">${progress}%</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">大小</span>
              <span class="mono">${escapeHtml(formatSize(dl.size))}</span>
            </div>
            ${dl.speed > 0 ? '<div class="detail-item"><span class="detail-label">速度</span><span class="speed-value">' + escapeHtml(formatSpeed(dl.speed)) + '</span></div>' : ''}
            <div class="detail-item">
              <span class="detail-label">分片</span>
              <span class="mono">${dl.fragmentsDone}/${dl.fragments}</span>
            </div>
          </div>
          <div class="card-actions">${actionsHtml}</div>
        </div>
      `;
    }

    function renderList() {
      const active = downloads.filter(d => d.status === 'downloading' || d.status === 'paused' || d.status === 'pending');
      const completed = downloads.filter(d => d.status === 'completed' || d.status === 'failed' || d.status === 'cancelled');
      document.getElementById('active-downloads').innerHTML = active.map(renderCard).join('');
      document.getElementById('completed-downloads').innerHTML = completed.map(renderCard).join('');
      document.getElementById('empty-state').style.display = downloads.length === 0 ? 'flex' : 'none';

      // 更新侧边栏统计
      const totalSpeed = active.reduce((sum, d) => sum + (d.speed || 0), 0);
      document.getElementById('stat-speed').textContent = formatSpeed(totalSpeed);
      document.getElementById('stat-connections').textContent = downloads.filter(d => d.status === 'downloading').length;
      document.getElementById('stat-queue').textContent = active.length;
    }

    function selectDownload(id) {
      selectedId = id;
      const dl = downloads.find(d => d.id === id);
      if (!dl) return;
      const panel = document.getElementById('detail-panel');
      panel.style.display = 'block';
      document.getElementById('panel-filename').textContent = dl.name;
      document.getElementById('panel-size').textContent = formatSize(dl.size);
      document.getElementById('panel-downloaded').textContent = formatSize(dl.downloaded);
      document.getElementById('panel-speed').textContent = dl.speed > 0 ? formatSpeed(dl.speed) : '--';
      document.getElementById('panel-fragments').textContent = dl.fragments;
      document.getElementById('panel-protocol').textContent = dl.protocol;
      document.getElementById('panel-status').textContent = statusText(dl.status);

      // 分片可视化
      const grid = document.getElementById('fragment-grid');
      grid.innerHTML = '';
      for (let i = 0; i < dl.fragments; i++) {
        const block = document.createElement('div');
        block.className = 'fragment-block ' + (i < dl.fragmentsDone ? 'done' : (i === dl.fragmentsDone && dl.status === 'downloading' ? 'active' : 'pending'));
        grid.appendChild(block);
      }

      // 高亮选中卡片
      document.querySelectorAll('.download-card').forEach(card => {
        card.style.borderColor = card.dataset.id === id ? 'var(--accent)' : '';
      });
    }

    // ======================================================================
    // Tauri 命令交互
    // ======================================================================

    /**
     * 创建下载任务 - 调用 Tauri create_task 命令
     */
    async function startDownload() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) return;
      try {
        const taskId = await invoke('create_task', { url });
        // 刷新任务列表以获取后端最新数据
        await refreshTaskList();
        document.getElementById('url-input').value = '';
      } catch (e) {
        console.error('创建任务失败:', e);
      }
    }

    /**
     * 从后端刷新任务列表,同步到前端 downloads 数组
     */
    async function refreshTaskList() {
      try {
        const tasks = await invoke('get_task_list');
        // 将后端 TaskInfo 转换为前端格式
        downloads.length = 0;
        if (Array.isArray(tasks)) {
          tasks.forEach(t => {
            downloads.push({
              id: t.id,
              name: t.file_name,
              ext: guessExtFromName(t.file_name),
              url: t.url,
              size: t.file_size || 0,
              downloaded: t.downloaded || 0,
              speed: t.speed || 0,
              status: t.status,
              fragments: t.fragments_total || 0,
              fragmentsDone: t.fragments_done || 0,
              protocol: 'HTTPS',
            });
          });
        }
        renderList();
        // 如果当前有选中任务,刷新详情面板
        if (selectedId) {
          const exists = downloads.find(d => d.id === selectedId);
          if (exists) {
            selectDownload(selectedId);
          } else {
            // 选中的任务已被删除,隐藏面板
            document.getElementById('detail-panel').style.display = 'none';
            selectedId = null;
          }
        }
      } catch (e) {
        console.error('刷新任务列表失败:', e);
      }
    }

    /**
     * 暂停任务
     */
    async function taskPause(taskId) {
      try {
        await invoke('pause_task', { taskId });
        await refreshTaskList();
      } catch (e) {
        console.error('暂停任务失败:', e);
      }
    }

    /**
     * 恢复任务
     */
    async function taskResume(taskId) {
      try {
        await invoke('resume_task', { taskId });
        await refreshTaskList();
      } catch (e) {
        console.error('恢复任务失败:', e);
      }
    }

    /**
     * 取消任务
     */
    async function taskCancel(taskId) {
      try {
        await invoke('cancel_task', { taskId });
        await refreshTaskList();
      } catch (e) {
        console.error('取消任务失败:', e);
      }
    }

    /**
     * 删除任务
     */
    async function taskDelete(taskId) {
      try {
        await invoke('delete_task', { taskId });
        await refreshTaskList();
      } catch (e) {
        console.error('删除任务失败:', e);
      }
    }

    /**
     * 全部暂停 - 暂停所有活跃任务
     */
    async function pauseAll() {
      const active = downloads.filter(d => d.status === 'downloading' || d.status === 'pending');
      for (const dl of active) {
        try {
          await invoke('pause_task', { taskId: dl.id });
        } catch (e) {
          console.error('暂停任务 ' + dl.id + ' 失败:', e);
        }
      }
      await refreshTaskList();
    }

    // ======================================================================
    // 设置面板
    // ======================================================================

    /**
     * 从后端加载配置并填充设置面板
     */
    async function loadSettings() {
      try {
        const config = await invoke('get_config');
        document.getElementById('cfg-download-dir').value = config.download_dir || '';
        document.getElementById('cfg-max-tasks').value = config.max_concurrent_tasks || 5;
        document.getElementById('cfg-max-fragments').value = config.max_concurrent_fragments || 16;
        document.getElementById('cfg-max-connections').value = config.max_connections_per_host || 16;
        // 开关状态
        setToggle('cfg-quic', config.enable_quic);
        setToggle('cfg-verify', config.verify_checksum);
      } catch (e) {
        console.error('加载设置失败:', e);
      }
    }

    /**
     * 收集设置面板的值并保存到后端
     */
    async function saveSettings() {
      const config = {
        download_dir: document.getElementById('cfg-download-dir').value,
        max_concurrent_tasks: parseInt(document.getElementById('cfg-max-tasks').value) || 5,
        max_concurrent_fragments: parseInt(document.getElementById('cfg-max-fragments').value) || 16,
        max_connections_per_host: parseInt(document.getElementById('cfg-max-connections').value) || 16,
        enable_quic: getToggle('cfg-quic'),
        verify_checksum: getToggle('cfg-verify'),
      };
      try {
        await invoke('update_config', { config });
        // 保存成功的视觉反馈
        const btn = event.target;
        btn.textContent = '已保存';
        btn.style.background = '#22c55e';
        setTimeout(() => { btn.textContent = '保存设置'; btn.style.background = ''; }, 1500);
      } catch (e) {
        console.error('保存设置失败:', e);
      }
    }

    /** 设置 toggle 开关状态 */
    function setToggle(id, value) {
      const el = document.getElementById(id);
      if (value) {
        el.classList.add('on');
      } else {
        el.classList.remove('on');
      }
    }

    /** 获取 toggle 开关状态 */
    function getToggle(id) {
      return document.getElementById(id).classList.contains('on');
    }

    // ======================================================================
    // 嗅探面板
    // ======================================================================

    const snifferItems = [
      { type: 'video', name: 'lecture-recording.mp4', url: 'https://cdn.edu/lectures/2024/lecture-recording.mp4?token=abc123', size: 524288000 },
      { type: 'video', name: 'tutorial.webm', url: 'https://videos.example.com/tutorial.webm', size: 104857600 },
      { type: 'audio', name: 'podcast-ep42.mp3', url: 'https://podcast.fm/ep42.mp3', size: 52428800 },
      { type: 'document', name: 'whitepaper.pdf', url: 'https://docs.example.com/whitepaper.pdf', size: 2097152 },
      { type: 'archive', name: 'dataset-v2.zip', url: 'https://data.example.com/dataset-v2.zip', size: 1073741824 },
      { type: 'executable', name: 'app-setup.exe', url: 'https://download.example.com/app-setup.exe', size: 104857600 },
    ];
    let snifferActive = true;

    function renderSniffer() {
      const list = document.getElementById('sniffer-list');
      const empty = document.getElementById('sniffer-empty');
      if (!snifferActive || snifferItems.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'flex';
        return;
      }
      empty.style.display = 'none';
      list.innerHTML = snifferItems.map((item, i) => `
        <div class="sniffer-item">
          <span class="sniffer-type type-${escapeAttr(item.type)}">${escapeHtml(item.type)}</span>
          <div class="sniffer-info">
            <div class="sniffer-name">${escapeHtml(item.name)}</div>
            <div class="sniffer-url">${escapeHtml(item.url)}</div>
          </div>
          <span class="sniffer-size mono">${escapeHtml(formatSize(item.size))}</span>
          <div class="sniffer-actions">
            <button class="btn-sm btn-download-sm" onclick="downloadSnifferItem(${i})">下载</button>
          </div>
        </div>
      `).join('');
    }

    async function downloadSnifferItem(index) {
      const item = snifferItems[index];
      try {
        await invoke('create_task', { url: item.url });
        snifferItems.splice(index, 1);
        renderSniffer();
        await refreshTaskList();
        // 切换到下载视图
        document.querySelector('[data-view="downloads"]').click();
      } catch (e) {
        console.error('从嗅探面板创建任务失败:', e);
      }
    }

    function toggleSniffer() {
      snifferActive = !snifferActive;
      const status = document.getElementById('sniffer-status');
      status.textContent = snifferActive ? '监听中' : '已暂停';
      status.className = 'sniffer-status ' + (snifferActive ? 'active' : 'inactive');
      renderSniffer();
    }

    // ======================================================================
    // 事件绑定
    // ======================================================================

    document.getElementById('btn-download').addEventListener('click', startDownload);
    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') startDownload();
    });
    document.getElementById('btn-pause-all').addEventListener('click', pauseAll);

    // 视图切换
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        const view = item.dataset.view;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        document.querySelectorAll('.downloads-view, .sniffer-view, .settings-view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        // 顶部栏只在下载视图显示
        document.querySelector('.topbar').style.display = view === 'downloads' ? 'flex' : 'none';
        // 详情面板只在下载视图显示
        if (view !== 'downloads') document.getElementById('detail-panel').style.display = 'none';
        // 切换到设置视图时加载最新配置
        if (view === 'settings') loadSettings();
      });
    });

    // ======================================================================
    // 初始化
    // ======================================================================

    async function init() {
      await loadSettings();
      await refreshTaskList();
      renderSniffer();
      // 定时从后端刷新活跃任务状态
      setInterval(refreshTaskList, 2000);
    }
    init();
  </script>
</body>
</html>
