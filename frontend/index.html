<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumFetch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 16px 24px;
      background: #12121a;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }
    .url-input {
      width: 600px;
      max-width: 90vw;
      display: flex;
      gap: 8px;
    }
    .url-input input {
      flex: 1;
      padding: 12px 16px;
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-input input:focus {
      border-color: #6366f1;
    }
    .url-input button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    .url-input button:hover { opacity: 0.9; }
    .info {
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">QuantumFetch</div>
    <div class="info" id="app-info"></div>
  </div>
  <div class="main">
    <div class="url-input">
      <input type="text" id="url" placeholder="输入下载链接..." />
      <button onclick="startDownload()">下载</button>
    </div>
    <div class="info">支持 HTTP/HTTPS/FTP/QUIC 协议,多线程分片下载</div>
  </div>
  <script>
    async function init() {
      try {
        const { invoke } = window.__TAURI__.core;
        const info = await invoke('get_app_info');
        document.getElementById('app-info').textContent = `${info.name} v${info.version}`;
      } catch (e) {
        document.getElementById('app-info').textContent = 'QuantumFetch v0.1.0';
      }
    }
    function startDownload() {
      const url = document.getElementById('url').value;
      if (url) {
        console.log('下载:', url);
      }
    }
    init();
  </script>
</body>
</html>
