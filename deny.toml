# cargo-deny 配置
# 参考: https://embarkstudios.github.io/cargo-deny/

[graph]
# 全平台检查
all-features = true

[advisories]
# 使用 RustSec 漏洞数据库
version = 2
# 忽略的已知漏洞
# M-22: glib unsound (RUSTSEC-2024-0429) — gtk-rs GTK3 绑定不再维护,
# glib 存在已确认的 unsound 缺陷。Tauri v2 在 Linux 上依赖 GTK3/WebKitGTK,
# 无法主动解决。等待 Tauri v3 迁移到 GTK4 后移除此条目。
# 注意: 此条目仅在 Linux 目标构建时生效(Windows/MacOS 依赖树中不含 glib)。
ignore = ["RUSTSEC-2024-0429"]

[licenses]
version = 2
# 允许的宽松许可证
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
# 对未列出的许可证发出警告而非报错
confidence-threshold = 0.8

[bans]
# 宽松模式:允许重复依赖(Rust 生态常见)
multiple-versions = "warn"
# 设为 warn 而非 deny,因为部分传递依赖可能使用通配符版本
# 通过 dependabot 定期更新依赖版本保持锁定
wildcards = "warn"

[sources]
# 仅允许来自 crates.io 的依赖
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
